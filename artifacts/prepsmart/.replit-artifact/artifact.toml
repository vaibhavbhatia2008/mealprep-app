kind = "web"
previewPath = "/"
title = "PrepSmart"
version = "1.0.0"
id = "artifacts/prepsmart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23063

[services.development]
run = "pnpm --filter @workspace/prepsmart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prepsmart", "run", "build" ]
publicDir = "artifacts/prepsmart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23063"
BASE_PATH = "/"
