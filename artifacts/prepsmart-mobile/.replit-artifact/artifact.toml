kind = "mobile"
previewPath = "/mobile/"
title = "PrepSmart Mobile"
version = "1.0.0"
id = "artifacts/prepsmart-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22108

[services.development]
run = "pnpm --filter @workspace/prepsmart-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prepsmart-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/prepsmart-mobile", "run", "serve" ]

[services.env]
PORT = "22108"
BASE_PATH = "/mobile/"
